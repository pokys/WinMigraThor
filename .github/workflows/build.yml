name: Build & Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build migrator.exe
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: "0"
        run: |
          BUILD_DATE=$(date -u +"%Y-%m-%d")
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="0.0.0+${GITHUB_SHA::8}"
          fi
          go build \
            -ldflags "-s -w -X main.version=${VERSION} -X main.buildDate=${BUILD_DATE}" \
            -o migrator.exe \
            .
          ls -lh migrator.exe

      # ── Rolling "latest" release (every push to main) ──────────────────────
      - name: Publish latest release
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Delete existing latest release + tag if present
          gh release delete latest --yes 2>/dev/null || true
          git push --delete origin latest 2>/dev/null || true

          # Create fresh latest release
          gh release create latest migrator.exe \
            --title "migrator latest" \
            --notes "Automaticky sestaveno z \`main\`.

**Commit:** \`${GITHUB_SHA}\`
**Datum:** $(date -u +"%Y-%m-%d %H:%M UTC")

Stáhni \`migrator.exe\` níže a spusť jako správce." \
            --prerelease

      # ── Versioned release (on tag v*) ──────────────────────────────────────
      - name: Publish versioned release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          gh release create "${GITHUB_REF_NAME}" migrator.exe \
            --title "migrator v${VERSION}" \
            --generate-notes
