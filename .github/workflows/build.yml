name: Build & Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version string (e.g. 1.2.3)"
        required: false
        default: "dev"

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build migrator.exe & publish release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
            RELEASE_TAG="$GITHUB_REF_NAME"
            RELEASE_NAME="migrator v${VERSION}"
            PRERELEASE=false
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.version }}" != "dev" ]]; then
            VERSION="${{ inputs.version }}"
            RELEASE_TAG="latest"
            RELEASE_NAME="migrator latest"
            PRERELEASE=true
          else
            VERSION="0.0.0+${GITHUB_SHA::8}"
            RELEASE_TAG="latest"
            RELEASE_NAME="migrator latest"
            PRERELEASE=true
          fi
          echo "version=$VERSION"           >> "$GITHUB_OUTPUT"
          echo "release_tag=$RELEASE_TAG"   >> "$GITHUB_OUTPUT"
          echo "release_name=$RELEASE_NAME" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE"     >> "$GITHUB_OUTPUT"
          echo "→ version=$VERSION  tag=$RELEASE_TAG  prerelease=$PRERELEASE"

      - name: Download dependencies
        run: go mod download

      - name: Build
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: "0"
        run: |
          BUILD_DATE=$(date -u +"%Y-%m-%d")
          go build \
            -ldflags "-s -w -X main.version=${{ steps.version.outputs.version }} -X main.buildDate=${BUILD_DATE}" \
            -o migrator.exe \
            .
          ls -lh migrator.exe
          file migrator.exe

      # For "latest" release: delete the existing tag so the release can be recreated
      - name: Delete existing 'latest' tag (rolling release only)
        if: steps.version.outputs.release_tag == 'latest'
        run: git push --delete origin latest 2>/dev/null || true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.release_tag }}
          name: ${{ steps.version.outputs.release_name }}
          prerelease: ${{ steps.version.outputs.prerelease }}
          files: migrator.exe
          generate_release_notes: ${{ startsWith(github.ref, 'refs/tags/v') }}
          body: |
            ${{ steps.version.outputs.release_tag == 'latest' && format('**Commit:** `{0}`  \n**Datum:** {1}  \n\nAutomaticky sestaveno z každého push do `main`. Pro stabilní verze použij tagged release.', github.sha, github.event.head_commit.timestamp) || '' }}
